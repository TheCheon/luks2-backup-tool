# =============================================================================
# backup.conf — configuration for the backup project
# Loaded by backup.sh and backup-manual.sh.
# Installed to /etc/backup/backup.conf (root-readable).
# Edit this file, not the scripts.
# =============================================================================

# --- LUKS drive ---------------------------------------------------------------

# Partition containing the LUKS2 container.
# Use a stable path — by-uuid is recommended (find with: lsblk -f).
LUKS_DEVICE="/dev/disk/by-uuid/93228ec1-1e5d-4d69-b982-87ac70ba3bc9"

# Name the mapper device will get after unlocking (/dev/mapper/<this>).
LUKS_MAPPER="backup_drive"

# Keyfile used to unlock the drive (generated by install.sh, root-only).
LUKS_KEYFILE="/etc/backup/backup.key"

# --- Mount --------------------------------------------------------------------

MOUNT_POINT="/mnt/backup"

# Subdirectory inside the mounted drive where files land.
BACKUP_DEST="$MOUNT_POINT/home-backup"

# --- What to back up ----------------------------------------------------------

# Folders to include, relative to /home/<user>. 
# Add or remove lines freely. Comment out a line to skip that folder.
# Wildcards are NOT supported here — list explicit directories.
SOURCE_USER="fick-dich-weg"

BACKUP_DIRS=(
    "Documents"
    "Downloads"
    "Pictures"
    "Videos"
    "Music"
    "Desktop"
    ".config"
    ".ssh"
    ".gnupg"
    "things"     # your personal projects folder
)

# --- Excludes -----------------------------------------------------------------
# Patterns excluded within the above directories (rsync filter syntax).

EXCLUDES=(
    ".cache"
    "*/.cache"
    "*.tmp"
    "*.swp"
    "node_modules"
    "__pycache__"
    ".local/share/Trash"
    ".thumbnails"
    ".var/app/*/cache"
)

# --- Schedule (used by the timer, informational here) -------------------------

# The timer fires on boot (+3 min) and at this time every day.
# To change the time, edit backup.timer and run: systemctl daemon-reload
DAILY_TIME="02:30"

# --- Log file -----------------------------------------------------------------

LOG_FILE="/var/log/backup.log"

# --- Snapshots ----------------------------------------------------------------
# Each backup run creates a new timestamped folder (YYYY-MM-DD_HH-MM-SS) and
# uses rsync --link-dest to hardlink unchanged files from the previous snapshot,
# keeping disk usage low while giving you a full history.

# How many timestamped snapshots to keep on the encrypted drive.
REMOTE_BACKUP_KEEP=10

# --- Local snapshots ----------------------------------------------------------
# Hardlink-based read-only snapshots stored locally — great safety net against
# accidental rm -rf or file corruption (no drive needed for recovery).
LOCAL_BACKUP_ENABLED=true
LOCAL_BACKUP_DIR="/var/backup/snapshots"
LOCAL_BACKUP_KEEP=10

# --- Disk space warning -------------------------------------------------------
# Warn in the log if less than this many GB remain on a backup target.
MIN_FREE_GB=5
