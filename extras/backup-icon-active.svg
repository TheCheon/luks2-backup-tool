<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hard drive body -->
  <rect x="6" y="18" width="52" height="36" rx="7" fill="#2563eb"/>
  <!-- Top faceplate (darker) -->
  <rect x="6" y="18" width="52" height="13" rx="7" fill="#1d4ed8"/>
  <rect x="6" y="27" width="52" height="4" fill="#1d4ed8"/>
  <!-- Platter -->
  <circle cx="26" cy="39" r="9" fill="#1e3a8a"/>
  <circle cx="26" cy="39" r="4" fill="#3b82f6"/>
  <circle cx="26" cy="39" r="1.5" fill="#1e3a8a"/>
  <!-- Read arm -->
  <line x1="33" y1="32" x2="26" y2="39" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <!-- Both LEDs green — drive active -->
  <circle cx="48" cy="33" r="2.8" fill="#4ade80"/>
  <circle cx="41" cy="33" r="2.8" fill="#4ade80"/>
  <!-- Orange circular-arrow badge (top-right) — indicates activity -->
  <circle cx="49" cy="19" r="13" fill="#ea580c"/>
  <!-- Top arc -->
  <path d="M49 11 A8 8 0 0 1 57 19" stroke="white" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <polygon points="55,23 59,17.5 53.5,16" fill="white"/>
  <!-- Bottom arc -->
  <path d="M49 27 A8 8 0 0 1 41 19" stroke="white" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <polygon points="43,15 39,20.5 44.5,22" fill="white"/>
</svg>
